<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C1917">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Renovasi">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">

<title>Renovasi Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F1ED;--surf:#FDFAF7;--surf2:#EDE9E3;
  --ink:#1C1917;--ink2:#78716C;--ink3:#A8A29E;
  --acc:#C2410C;--acc-l:#FFF7ED;
  --grn:#15803D;--grn-l:#F0FDF4;
  --amb:#B45309;--amb-l:#FFFBEB;
  --red:#DC2626;--red-l:#FEF2F2;
  --pur:#7C3AED;--pur-l:#F5F3FF;
  --blu:#0369A1;--blu-l:#F0F9FF;
  --bdr:#E7E2DA;--r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;
/* FIX: Prevent pull-to-refresh interfering with app scroll on Android Chrome */
overscroll-behavior-y:contain}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--ink);padding:env(safe-area-inset-top,0px) 16px 12px;padding-top:calc(env(safe-area-inset-top,0px) + 14px);display:flex;align-items:center;gap:10px;min-height:56px}
/* FIX: back button was 34px — below 44px minimum touch target */
.tb-back{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.tb-title{color:#fff;font-size:16px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-sub{color:rgba(255,255,255,.5);font-size:11px;margin-top:1px}
.tb-act{background:rgba(255,255,255,.12);border:none;color:#fff;padding:9px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;min-height:44px;touch-action:manipulation}

/* BOTTOM NAV */
/* FIX: Add safe-area-inset-bottom support for iPhone notch devices */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surf);border-top:1px solid var(--bdr);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
/* FIX: nav button min-height 56px for comfortable thumb tap */
.nb{flex:1;padding:10px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;min-height:56px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ni{font-size:22px;line-height:1}.nl{font-size:10px;font-weight:600;color:var(--ink3)}
.nb.on .nl{color:var(--acc)}.nd{width:4px;height:4px;border-radius:2px;background:var(--acc);display:none}
.nb.on .nd{display:block}

/* CONTENT */
/* FIX: Increased bottom padding to account for FAB + nav */
.content{padding:16px 16px 100px}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
/* FIX: Larger padding for better readability on small screens */
.sc{background:var(--surf);border-radius:var(--r);padding:14px 8px;text-align:center;border:1px solid var(--bdr)}
.si{font-size:20px;margin-bottom:4px}.sv{font-size:18px;font-weight:800;line-height:1.1}
/* FIX: sm text was 10px — unreadable. Bumped to 11px */
.sv.sm{font-size:11px}.sl{font-size:10px;color:var(--ink3);margin-top:2px;font-weight:500}

/* CARDS */
.dcard{background:var(--surf);border-radius:var(--r);margin-bottom:10px;border:1px solid var(--bdr);cursor:pointer;overflow:hidden;transition:transform .15s}
.dcard:active{transform:scale(.98)}.ci{display:flex;gap:12px;padding:14px}
.cthumb{width:74px;height:74px;border-radius:10px;flex-shrink:0;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.cthumb img{width:100%;height:100%;object-fit:cover}
.cbody{flex:1;min-width:0}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.br{background:var(--grn-l);color:var(--grn)}.bs{background:var(--amb-l);color:var(--amb)}
.bp{background:var(--red-l);color:var(--red)}.bm{background:var(--surf2);color:var(--ink2)}
.be{background:var(--pur-l);color:var(--pur)}.bb{background:var(--blu-l);color:var(--blu)}
.ct{font-size:14px;font-weight:700}.cd{font-size:12px;color:var(--ink2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc{font-size:13px;font-weight:700;color:var(--acc);margin-top:5px;font-family:'DM Mono',monospace}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.ei{font-size:64px;margin-bottom:14px}.et{font-size:18px;font-weight:700;margin-bottom:8px}
.es{font-size:14px;color:var(--ink2);line-height:1.5}

/* FAB */
/* FIX: FAB positioning was using fragile calc(50% - 200px + 16px) — breaks on narrow screens.
   Use right:16px with max-width constraint instead. Also raised above safe area + nav. */
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom, 0px) + 72px);right:16px;width:56px;height:56px;border-radius:28px;background:var(--acc);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(194,65,12,.45);display:flex;align-items:center;justify-content:center;z-index:99;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
/* Center FAB within max-width 480px constraint */
@media (min-width:512px){
  .fab{right:calc(50% - 240px + 16px);transform:none}
}

/* FORM */
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
/* FIX: font-size 16px to prevent iOS auto-zoom on focus; increased padding for touch comfort */
.fi,.fsel,.fta{width:100%;padding:13px 14px;border:1.5px solid var(--bdr);border-radius:var(--rs);font-size:16px;font-family:inherit;background:var(--surf);color:var(--ink);outline:none;-webkit-appearance:none}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--acc)}
/* FIX: min-height 100px for textarea — easier to tap and type */
.fta{resize:vertical;min-height:100px;line-height:1.5}
.input-wrap{position:relative}
.input-edit-hint{font-size:10px;color:var(--ink3);margin-top:4px}
.sr{display:flex;gap:8px}
/* FIX: severity buttons — min-height 48px for thumb-friendly tap */
.sb{flex:1;padding:13px 0;border-radius:var(--rs);border:2px solid var(--bdr);background:var(--surf);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.sb.ar{border-color:var(--grn);background:var(--grn-l);color:var(--grn)}
.sb.as{border-color:var(--amb);background:var(--amb-l);color:var(--amb)}
.sb.ap{border-color:var(--red);background:var(--red-l);color:var(--red)}

/* MATERIAL GRADE */
.mg-row{display:flex;gap:8px}
.mg-btn{flex:1;padding:10px 4px;border-radius:var(--rs);border:2px solid var(--bdr);background:var(--surf);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;touch-action:manipulation;transition:all .15s}
.mg-btn .mg-icon{font-size:20px;line-height:1}
.mg-btn .mg-label{font-size:11px;font-weight:800}
.mg-btn .mg-sub{font-size:9px;color:var(--ink3);font-weight:500;line-height:1.3}
.mg-btn.sel-eco{border-color:#0369A1;background:#F0F9FF;color:#0369A1}.mg-btn.sel-eco .mg-sub{color:#0369A1;opacity:.7}
.mg-btn.sel-mid{border-color:var(--amb);background:var(--amb-l);color:var(--amb)}.mg-btn.sel-mid .mg-sub{color:var(--amb);opacity:.7}
.mg-btn.sel-pre{border-color:var(--pur);background:var(--pur-l);color:var(--pur)}.mg-btn.sel-pre .mg-sub{color:var(--pur);opacity:.7}

/* PHOTO */
.pgrid{display:flex;flex-wrap:wrap;gap:8px}
/* FIX: photo size 88px for better touch. Delete button 28px — was 20px (too small!) */
.pw{position:relative}.pt{width:88px;height:88px;border-radius:10px;object-fit:cover;display:block}
.pd{position:absolute;top:-8px;right:-8px;width:28px;height:28px;border-radius:14px;background:var(--red);color:#fff;border:2px solid var(--surf);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
/* FIX: Add photo button 88x88 to match photo size */
.pa{width:88px;height:88px;border-radius:10px;border:2px dashed var(--bdr);background:var(--surf2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:3px;font-size:11px;color:var(--ink3);font-weight:600;touch-action:manipulation}

/* BUTTONS */
/* FIX: min-height 52px for all primary buttons, larger font */
.btn{width:100%;padding:15px;border-radius:var(--rs);font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;min-height:52px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.85}
.bp2{background:var(--acc);color:#fff}.bsec{background:var(--surf2);color:var(--ink)}
.bdk{background:var(--ink);color:#fff}.bpu{background:var(--pur);color:#fff}
.bdng{background:var(--red-l);color:var(--red)}.bgrn{background:var(--grn-l);color:var(--grn)}
.brow{display:flex;gap:10px}.brow .btn{flex:1}
.mt8{margin-top:8px}.mt12{margin-top:12px}

/* INFO CARD */
.ic{background:var(--surf);border-radius:var(--r);border:1px solid var(--bdr);padding:16px;margin-bottom:12px}
.il{font-size:11px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.iv{font-size:14px;color:var(--ink);line-height:1.5}.divider{height:1px;background:var(--bdr);margin:12px 0}

/* DETAIL PHOTOS */
.dphotos{display:flex;gap:8px;overflow-x:auto;padding:16px 16px 0;scrollbar-width:none}
.dphotos::-webkit-scrollbar{display:none}
.dphotos img{height:190px;border-radius:var(--r);object-fit:cover;flex-shrink:0}

/* ═══ MARKDOWN RENDERER STYLES ═══ */
.md-body{font-size:13px;line-height:1.7;color:var(--ink)}
.md-body h1,.md-body h2{font-size:14px;font-weight:700;margin:14px 0 6px;color:var(--ink)}
.md-body h3{font-size:13px;font-weight:700;margin:12px 0 5px;color:var(--ink2)}
.md-body p{margin-bottom:8px}
.md-body strong,.md-body b{font-weight:700;color:var(--ink)}
.md-body em{font-style:italic;color:var(--ink2)}
.md-body hr{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.md-body ul,.md-body ol{padding-left:18px;margin-bottom:8px}
.md-body li{margin-bottom:3px}
.md-body code{background:var(--surf2);padding:1px 5px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px}
/* TABLE */
.md-body .tbl-wrap{overflow-x:auto;margin:10px 0;border-radius:var(--rs);border:1px solid var(--bdr)}
.md-body table{width:100%;border-collapse:collapse;font-size:12px}
.md-body thead tr{background:var(--ink);color:#fff}
.md-body thead th{padding:8px 10px;text-align:left;font-weight:700;font-size:11px;white-space:nowrap}
.md-body tbody tr:nth-child(even){background:var(--surf2)}
.md-body tbody tr:hover{background:var(--acc-l)}
.md-body tbody td{padding:7px 10px;border-bottom:1px solid var(--bdr);vertical-align:top}
.md-body tbody td:last-child{text-align:right;font-family:'DM Mono',monospace;font-weight:600;white-space:nowrap;color:var(--acc)}
/* TOTAL highlight */
.md-body .total-line{background:var(--acc);color:#fff;border-radius:var(--rs);padding:10px 14px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;font-weight:700}
.md-body .total-line span:last-child{font-family:'DM Mono',monospace;font-size:16px}
.md-body .subtotal-line{background:var(--surf2);border-radius:var(--rs);padding:7px 12px;margin:4px 0;display:flex;justify-content:space-between;font-size:12px;font-weight:700}

/* AI FLOW */
.how-box{background:var(--pur-l);border:1px solid #DDD6FE;border-radius:var(--r);padding:14px;margin-bottom:14px}
.how-title{font-size:13px;font-weight:700;color:var(--pur);margin-bottom:6px}
.how-steps{font-size:12px;color:#5B21B6;line-height:1.8}
.pbox{background:var(--ink);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.ph{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)}
.pht{color:#fff;font-size:13px;font-weight:700}
.cpbtn{background:rgba(255,255,255,.13);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.cpbtn:active{background:rgba(255,255,255,.25)}
.pb{padding:14px;font-size:12px;color:rgba(255,255,255,.8);line-height:1.6;font-family:'DM Mono',monospace;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.aigrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.aichip{padding:12px 10px;border-radius:var(--rs);border:1.5px solid var(--bdr);background:var(--surf);display:flex;align-items:center;gap:8px;text-decoration:none}
.aichip:active{background:var(--surf2)}
.acn{font-size:12px;font-weight:700;color:var(--ink)}.acs{font-size:10px;color:var(--ink3)}
.freetag{font-size:9px;font-weight:700;color:var(--grn);background:var(--grn-l);padding:1px 5px;border-radius:4px;display:inline-block;margin-top:2px}

/* PASTE */
/* FIX: font-size 16px prevents iOS auto-zoom on textarea focus */
.paste-ta{width:100%;min-height:150px;padding:14px;border:2px dashed var(--bdr);border-radius:var(--r);font-size:16px;font-family:'DM Mono',monospace;background:var(--surf);color:var(--ink);line-height:1.5;resize:vertical;outline:none;-webkit-appearance:none}
.paste-ta:focus{border-color:var(--pur);border-style:solid}
.paste-hint{font-size:11px;color:var(--ink3);margin-top:6px;line-height:1.5}

/* CUSTOM DROPDOWN (replaces datalist to fix overlap bug on Android) */
.sel-wrap{position:relative}
.sel-arr{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink3);font-size:14px;cursor:pointer;padding:4px;line-height:1}
.sel-drop{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surf);border:1.5px solid var(--acc);border-radius:var(--rs);z-index:500;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(28,25,23,.12);-webkit-overflow-scrolling:touch}
.sel-drop.open{display:block}
.sel-opt{padding:12px 14px;font-size:15px;cursor:pointer;border-bottom:1px solid var(--bdr);color:var(--ink)}
.sel-opt:last-child{border-bottom:none}
.sel-opt:active,.sel-opt.hover{background:var(--acc-l);color:var(--acc);font-weight:600}

/* NOTES TOOLTIP */
.notes-tip{background:var(--ink);color:#fff;border-radius:var(--r);padding:14px 16px;margin-bottom:12px;font-size:13px;line-height:1.6;display:none}
.notes-tip.show{display:block;animation:ti .2s ease}
.notes-tip ul{padding-left:16px;margin-top:6px}
.notes-tip li{margin-bottom:4px}
/* FIX: min-height 52px for checkbox rows — easier thumb tap */
.comb-check-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surf2);border-radius:var(--rs);margin-bottom:8px;cursor:pointer;min-height:52px}
.comb-check-row input[type=checkbox]{width:22px;height:22px;cursor:pointer;accent-color:var(--pur);flex-shrink:0}
.comb-check-label{flex:1;font-size:13px}
.comb-check-sev{font-size:10px;font-weight:700;padding:2px 7px;border-radius:12px}

/* CITY BAR */
.citybar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:10px 16px;display:flex;align-items:center;gap:8px}
.citybar-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.city-input{flex:1;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:8px 10px;font-size:16px;font-family:inherit;background:var(--surf2);color:var(--ink);outline:none;min-width:0}
.city-input:focus{border-color:var(--acc);background:var(--surf)}

/* INCLUDE/EXCLUDE AI TOGGLE */
.ai-toggle{display:flex;align-items:center;gap:8px;padding:8px 14px 10px;border-top:1px solid var(--bdr);cursor:pointer}
.ai-toggle-chk{width:18px;height:18px;accent-color:var(--pur);cursor:pointer;flex-shrink:0}
.ai-toggle-lbl{font-size:11px;color:var(--ink2);cursor:pointer;user-select:none;flex:1}
.dcard.excluded{opacity:.55}
.dcard.excluded .ci{text-decoration:none}

/* DANGER ZONE */
.danger-zone{background:var(--red-l);border:1px solid #FECACA;border-radius:var(--r);padding:14px 16px;margin-top:12px}
.dz-title{font-size:11px;font-weight:700;color:var(--red);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.dz-btn{width:100%;padding:11px;border-radius:var(--rs);border:1.5px solid var(--red);background:none;color:var(--red);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px;touch-action:manipulation}
.dz-btn:active{background:#FEE2E2}.dz-btn+.dz-btn{margin-top:8px}

/* SETTINGS PAGE */
.set-section{margin-bottom:20px}
.set-label{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding:0 2px}
.set-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.set-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bdr);min-height:54px}
.set-row:last-child{border-bottom:none}
.set-row-icon{font-size:22px;flex-shrink:0;width:28px;text-align:center}
.set-row-body{flex:1;min-width:0}
.set-row-label{font-size:14px;font-weight:600}
.set-row-sub{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.4}
.set-row-action{flex-shrink:0;margin-left:8px}
.set-btn{padding:8px 14px;border-radius:var(--rs);border:1.5px solid var(--bdr);background:var(--surf2);color:var(--ink);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;min-height:38px;touch-action:manipulation;white-space:nowrap}
.set-btn.acc{border-color:var(--acc);background:var(--acc);color:#fff}
.set-btn.grn{border-color:var(--grn);background:var(--grn);color:#fff}
.set-btn.pur{border-color:var(--pur);background:var(--pur);color:#fff}
.set-btn.red{border-color:var(--red);background:none;color:var(--red)}

/* PWA INSTALL BANNER */
.install-banner{background:linear-gradient(135deg,#1C1917 0%,#44200C 100%);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:20px}
.install-banner-icon{font-size:34px;flex-shrink:0}
.install-banner-body{flex:1;min-width:0}
.install-banner-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:3px}
.install-banner-sub{font-size:12px;color:rgba(255,255,255,.6);line-height:1.4}
.install-banner-btn{background:var(--acc);color:#fff;border:none;border-radius:var(--rs);padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;min-height:44px;touch-action:manipulation;flex-shrink:0}

/* MERGE DUPLICATES */
.merge-row{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--surf2);border-radius:var(--rs);margin-bottom:8px}
.merge-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--pur);flex-shrink:0;margin-top:2px;cursor:pointer}
.merge-row-title{font-size:13px;font-weight:600}
.merge-row-sub{font-size:11px;color:var(--ink2);margin-top:2px}

/* TABS */
.tabs{display:flex;background:var(--surf2);border-radius:var(--rs);padding:3px;margin-bottom:16px}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink2);transition:all .2s}

<script>
// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const $=id=>document.getElementById(id);
function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function fmt(n){
  if(!n&&n!==0)return'—';
  // FIX BUG: Original used 'M' for miliar (billion) and 'jt' for juta (million).
  // 'M' is ambiguous — in Indonesian 'M' = miliar (10^9), not juta (10^6).
  // This was already correct in intent but the threshold order was fine.
  // Added proper rounding to avoid floating point issues like "Rp 1.0 jt" for 1050000.
  if(n>=1000000000)return'Rp '+(n/1000000000).toFixed(1)+' M';
  if(n>=1000000)return'Rp '+(n/1000000).toFixed(1)+' jt';
  return new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);
}

// ══════════════════════════════════════
// MARKDOWN → HTML RENDERER
// Handles: headers, bold, italic, hr, ul, ol, tables, code
// + auto-highlights TOTAL / GRAND TOTAL lines
// ══════════════════════════════════════
function renderMD(raw){
  if(!raw) return '';
  const lines = raw.split('\n');
  let html = '';
  let inTable = false, tableRows = [], inUl = false, inOl = false;

  function flushList(){
    if(inUl){html+='</ul>';inUl=false;}
    if(inOl){html+='</ol>';inOl=false;}
  }
  function flushTable(){
    if(!inTable||!tableRows.length)return;
    let t='<div class="tbl-wrap"><table>';
    tableRows.forEach((row,ri)=>{
      const cells=row.split('|').map(c=>c.trim()).filter((_,i,a)=>i>0&&i<a.length-1);
      if(ri===0){
        t+='<thead><tr>'+cells.map(c=>`<th>${parseLine(c)}</th>`).join('')+'</tr></thead><tbody>';
      } else if(ri===1&&cells.every(c=>/^-+$/.test(c))){
        // separator row — skip
      } else {
        t+='<tr>'+cells.map(c=>`<td>${parseLine(c)}</td>`).join('')+'</tr>';
      }
    });
    t+='</tbody></table></div>';
    html+=t; inTable=false; tableRows=[];
  }

  function parseLine(s){
    // bold
    s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/__(.+?)__/g,'<strong>$1</strong>');
    // italic
    s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
    // code
    s=s.replace(/`(.+?)`/g,'<code>$1</code>');
    return s;
  }

  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    const tr=l.trim();

    // Table detection
    if(tr.startsWith('|')){
      if(!inTable){inTable=true;tableRows=[];}
      flushList();
      tableRows.push(tr);
      continue;
    } else if(inTable){
      flushTable();
    }

    // HR
    if(/^---+$/.test(tr)||/^\*\*\*+$/.test(tr)){flushList();html+='<hr>';continue;}

    // Headings
    const hm=tr.match(/^(#{1,3})\s+(.+)/);
    if(hm){flushList();const tag='h'+hm[1].length;html+=`<${tag}>${parseLine(hm[2])}</${tag}>`;continue;}

    // UL
    const um=tr.match(/^[-*]\s+(.+)/);
    if(um){if(!inUl){html+='<ul>';inUl=true;}html+=`<li>${parseLine(um[1])}</li>`;continue;}

    // OL
    const om=tr.match(/^\d+\.\s+(.+)/);
    if(om){if(!inOl){html+='<ol>';inOl=true;}html+=`<li>${parseLine(om[1])}</li>`;continue;}

    flushList();

    // Empty line
    if(!tr){continue;}

    // TOTAL / GRAND TOTAL highlight
    const totM=tr.match(/^(\*{0,2})(GRAND\s+TOTAL|TOTAL\s+ESTIMASI|TOTAL\s+KESELURUHAN|TOTAL)[^\n]*(Rp[\s\d.,]+)/i);
    if(totM){
      const label=parseLine(tr.replace(/Rp[\s\d.,]+/,'').replace(/[*_#]/g,'').trim());
      const val=tr.match(/(Rp[\s\d.,]+)/i)?.[0]||'';
      html+=`<div class="total-line"><span>${label}</span><span>${val}</span></div>`;
      continue;
    }
    // Subtotal
    const subM=tr.match(/^(\*{0,2})(Subtotal|Total\s+Material|Total\s+Jasa|Total\s+Bahan)[^\n]*(Rp[\s\d.,]+)/i);
    if(subM){
      const label=parseLine(tr.replace(/Rp[\s\d.,]+/,'').replace(/[*_#]/g,'').trim());
      const val=tr.match(/(Rp[\s\d.,]+)/i)?.[0]||'';
      html+=`<div class="subtotal-line"><span>${label}</span><span>${val}</span></div>`;
      continue;
    }

    html+=`<p>${parseLine(tr)}</p>`;
  }

  flushList();
  flushTable();
  return `<div class="md-body">${html}</div>`;
}

function saveItems(){save('rv3_items',S.items)}
function saveCity(){save('rv3_city',S.city)}

// NAVIGATION

function go(v,id){
  S.view=v;
  if(v==='detail'&&id)S.detailId=id;
  render();
}

function render(){
  topbarUI();navUI();
  const vs={list:vList,add:vForm,detail:vDetail,ai:vAI,report:vReport,settings:vSettings};
  $('main').innerHTML=(vs[S.view]||vList)();
  $('fab').style.display=S.view==='list'?'flex':'none';
  const cb=$('citybar');
  if(cb){
    cb.style.display=['add','detail','settings'].includes(S.view)?'none':'flex';
    const ci=$('city-inp');
    if(ci&&ci!==document.activeElement)ci.value=S.city||'';
  }
}

function topbarUI(){
  const T={list:'Renovasi Tracker',add:S.editingId?'Edit Kerusakan':'Tambah Kerusakan',detail:'Detail Kerusakan',ai:'AI Estimasi',report:'Buat Laporan',settings:'Setelan'};
  $('tbt').textContent=T[S.view]||'';
  $('tbs').textContent=S.view==='list'?`${S.items.length} titik kerusakan`:'';
  const existing = $('tb-back');
  if(existing) existing.remove();
  $('tba').style.display='none';
  if(['add','detail'].includes(S.view)){
    const b=document.createElement('button');
    b.className='tb-back';b.id='tb-back';b.innerHTML='←';
    b.setAttribute('aria-label','Kembali');
    b.onclick=()=>go(S.view==='detail'?'list':'list');
    $('topbar').prepend(b);
  }
  if(S.view==='list'&&S.items.length>0){
    $('tba').style.display='';$('tba').textContent='🤖 Prompt Semua';
    $('tba').onclick=()=>{go('ai');setTimeout(()=>{S.aiTab='global';render()},30)};
  }
}

function navUI(){
  const activeNav = (S.view === 'add' || S.view === 'detail') ? 'list' : S.view;
  ['list','ai','report','settings'].forEach(v=>{const b=$('n-'+v);if(b)b.classList.toggle('on',activeNav===v)});
}

function vList(){
  const inclItems=S.items.filter(i=>i.includeInAI!==false);
  const bud=totalBudget(),we=inclItems.filter(i=>i.estimasi).length;
  const exclCount=S.items.length-inclItems.length;
  const parahCount=S.items.filter(i=>i.severity==='Parah').length;
  const stats=`<div class="sg">
    <div class="sc"><div class="si">🏚️</div><div class="sv">${S.items.length}</div><div class="sl">Kerusakan</div></div>

    <div class="sc"><div class="si">📊</div><div class="sv ${bud>0?'sm':''}">${bud>0?fmt(bud):'—'}</div><div class="sl">Total AI</div></div>

  if(!S.items.length)return`<div class="content">${stats}<div class="empty"><div class="ei">🏠</div><div class="et">Mulai Dokumentasikan Rumahmu</div><div class="es">Tap tombol <strong>+</strong> di pojok kanan bawah untuk menambah kerusakan pertama. Foto, deskripsi, lalu minta estimasi biaya dari AI secara gratis!</div><button class="btn bp2" style="max-width:200px;margin:16px auto 0" onclick="go('add')">➕ Tambah Kerusakan</button></div></div>`;

    const sc={Ringan:'br',Sedang:'bs',Parah:'bp'}[it.severity]||'bm';
    return`<div class="dcard${incl?'':' excluded'}">
      <div class="ci" onclick="go('detail','${it.id}')">
        ${thumb}
        <div class="cbody"><div class="badges">
          <span class="badge ${sc}">${it.severity}</span>
          <span class="badge bm">${it.room}</span>
          ${it.estimasi&&incl?`<span class="badge be">✓ Est.</span>`:''}
          ${it.materialGrade&&it.materialGrade!=='Menengah'?`<span class="badge ${it.materialGrade==='Ekonomis'?'bb':'be'}">${it.materialGrade==='Ekonomis'?'💰':'✨'} ${it.materialGrade}</span>`:''}
          ${!incl?`<span class="badge bm" style="background:#E2E8F0;color:#64748B">⊘ Skip AI</span>`:''}
        </div>
        <div class="ct">${it.category}</div>
        <div class="cd">${it.description}</div>
        ${it.estimasi?.grand_total&&incl?`<div class="cc">${fmt(it.estimasi.grand_total)}</div>`:''}
        </div>
      </div>
      <div style="display:flex;align-items:center;border-top:1px solid var(--bdr)">
        <label class="ai-toggle" style="flex:1">
          <input class="ai-toggle-chk" type="checkbox" ${incl?'checked':''} onchange="toggleAI('${it.id}',this.checked)">
          <span class="ai-toggle-lbl">${incl?'Sertakan dalam estimasi AI':'Dikecualikan dari estimasi AI'}</span>
        </label>
        <button onclick="confirmDel('${it.id}')" style="border:none;background:none;color:var(--ink3);font-size:18px;padding:8px 14px;cursor:pointer;min-height:40px;touch-action:manipulation" title="Hapus">🗑️</button>
      </div>
    </div>`;
  }).join('');

  const exclNote=exclCount>0?`<div style="font-size:11px;color:var(--ink3);text-align:center;margin:4px 0 12px;background:var(--surf2);border-radius:var(--rs);padding:6px 12px">⊘ ${exclCount} item dikecualikan dari estimasi AI</div>`:'';

  return`<div class="content">${stats}<div style="font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Daftar Kerusakan</div>${exclNote}${cards}</div>`;
}

// ══════════════════════════════════════
// CUSTOM DROPDOWN LOGIC
// ══════════════════════════════════════
const DEF_ROOMS=['Ruang Tamu','Kamar Tidur Utama','Kamar Tidur 2','Kamar Tidur 3','Dapur','Kamar Mandi Utama','Kamar Mandi 2','Garasi','Teras','Gudang'];
const DEF_CATS=['Dinding','Lantai','Atap / Plafon','Pintu / Jendela','Instalasi Listrik','Instalasi Air','Cat','Struktur'];

// Expose as module-level vars so vForm inline handlers can access them
let allRooms=DEF_ROOMS, allCats=DEF_CATS;

function rebuildDropLists(){
  allRooms=[...new Set([...DEF_ROOMS,...S.items.map(i=>i.room)])];
  allCats=[...new Set([...DEF_CATS,...S.items.map(i=>i.category)])];
}

function renderDropItems(wrapId, items, query=''){
  const drop=document.getElementById(wrapId+'-drop');
  if(!drop)return;
  const q=query.toLowerCase().trim();
  const filtered=q?items.filter(x=>x.toLowerCase().includes(q)):items;
  drop.innerHTML=filtered.map(x=>`<div class="sel-opt" onmousedown="pickDrop(event,'${wrapId}','${esc(x)}')">${x}</div>`).join('');
}

function openDrop(wrapId, items){
  renderDropItems(wrapId, items);
  const drop=document.getElementById(wrapId+'-drop');
  if(drop){drop.classList.add('open');}
}

function closeDrop(wrapId){
  const drop=document.getElementById(wrapId+'-drop');
  if(drop)drop.classList.remove('open');
}

function toggleDrop(wrapId, items){
  const drop=document.getElementById(wrapId+'-drop');
  if(!drop)return;
  if(drop.classList.contains('open')){closeDrop(wrapId);}
  else{
    const inp=document.querySelector('#'+wrapId+' .fi');
    if(inp)inp.focus();
    openDrop(wrapId, items);
  }
}

function filterDrop(wrapId, query, items){
  const drop=document.getElementById(wrapId+'-drop');
  if(!drop||!drop.classList.contains('open'))return;
  renderDropItems(wrapId, items, query);
}

function pickDrop(e, wrapId, val){
  e.preventDefault();
  const inp=document.querySelector('#'+wrapId+' .fi');
  if(inp){inp.value=val;inp.dispatchEvent(new Event('input'));}
  closeDrop(wrapId);
}

function showNotesTooltip(){
  let tip=document.getElementById('notes-tooltip');
  if(!tip)return;
  tip.classList.toggle('show');
}

function vDetail(){
  const it=S.items.find(i=>i.id===S.detailId);
  // FIX BUG: go('list') inside vDetail triggers a re-render mid-render cycle.
  // Return a loading/error state instead and schedule navigation after render.
  if(!it){
    setTimeout(()=>go('list'),0);
    return'<div class="content"><div class="empty"><div class="ei">⚠️</div><div class="et">Item tidak ditemukan</div></div></div>';
  }
  const photos=it.images.length?`<div class="dphotos">${it.images.map(s=>`<img src="${s}"/>`).join('')}</div>`:'';
  const sc={Ringan:'br',Sedang:'bs',Parah:'bp'}[it.severity]||'bm';

  let estBlock;
  if(!it.estimasi){
    estBlock=`<div class="ic" style="border:2px dashed var(--bdr);background:var(--surf2);text-align:center;padding:24px 16px">
      <div style="font-size:36px;margin-bottom:8px">🤖</div>
      <div style="font-weight:700;margin-bottom:6px">Belum Ada Estimasi</div>
      <div style="font-size:12px;color:var(--ink2);margin-bottom:14px;line-height:1.5">Tap tombol di bawah → copy prompt → paste ke AI gratis → paste hasilnya kembali.</div>

    const e=it.estimasi;

    estBlock=`<div style="border-radius:var(--r);overflow:hidden;margin-bottom:12px;border:1px solid var(--bdr)">
      <div style="background:var(--pur);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-weight:700;font-size:14px">🤖 Estimasi AI</span>
        <button onclick="openPromptSheet('${it.id}')" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">🔄 Perbarui</button>

  return`${photos}<div class="content" style="padding-top:12px">
    <div class="badges" style="margin-bottom:12px">
      <span class="badge ${sc}">${it.severity}</span>
      <span class="badge bm">${it.room}</span>
      <span class="badge bm">${it.category}</span>
      ${it.materialGrade?`<span class="badge ${it.materialGrade==='Ekonomis'?'bb':it.materialGrade==='Premium'?'be':'bs'}">${it.materialGrade==='Ekonomis'?'💰':it.materialGrade==='Premium'?'✨':'⚖️'} ${it.materialGrade}</span>`:''}
    </div>
    <div class="ic"><div class="il">Deskripsi Kerusakan</div><div class="iv">${it.description}</div>
    ${it.size?`<div class="divider"></div><div class="il">Ukuran Area</div><div class="iv">📐 ${it.size}</div>`:''}
    ${it.notes?`<div class="divider"></div><div class="il">Catatan untuk Kontraktor</div><div class="iv" style="color:var(--ink2)">${it.notes}</div>`:''}</div>
    ${estBlock}
    <div class="brow"><button class="btn bsec" onclick="startEdit('${it.id}')">✏️ Edit</button><button class="btn bdng" onclick="delItem('${it.id}')">🗑️ Hapus</button></div>

function vAICombo(){
  if(S.items.length<2)return`<div class="empty"><div class="ei">🔗</div><div class="et">Perlu Min. 2 Item</div><div class="es">Tambah lebih banyak kerusakan untuk digabungkan estimasinya.</div></div>`;

  const checks=S.items.map(it=>{
    const checked=S.combineIds.includes(it.id);
    const sc={Ringan:'br',Sedang:'bs',Parah:'bp'}[it.severity]||'bm';
    return`<label class="comb-check-row" style="cursor:pointer">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleCombine('${it.id}',this.checked)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${it.category} — ${it.room}</div>
        <div style="font-size:11px;color:var(--ink3);margin-top:1px">${it.description.length>50?it.description.slice(0,50)+'…':it.description||'—'}</div>
      </div>
      <span class="badge ${sc} comb-check-sev">${it.severity}</span>
    </label>`;
  }).join('');

  const selCount=S.combineIds.length;
  const prompt=selCount>=2?buildComboPrompt():'';
  const links=AI_APPS.map(a=>`<a href="${a.url}" target="_blank" class="aichip"><span style="font-size:22px">${a.icon}</span><div><div class="acn">${a.name}</div><div class="acs">${a.sub}</div><span class="freetag">${a.free}</span></div></a>`).join('');

  return`<div class="how-box" style="background:var(--grn-l);border-color:#BBF7D0">
    <div class="how-title" style="color:var(--grn)">💰 Estimasi Gabungan = Hemat Biaya!</div>
    <div class="how-steps" style="color:#166534">Mengerjakan beberapa pekerjaan sekaligus bisa hemat biaya tukang karena mobilisasi cukup sekali, dan pembelian material bisa dalam jumlah besar (lebih murah). Pilih item yang akan dikerjakan bersamaan:</div>
  </div>
  <div style="font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Pilih Item (${selCount} dipilih)</div>
  ${checks}
  ${selCount>=2?`
  <div style="background:var(--grn-l);border:1px solid #BBF7D0;border-radius:var(--rs);padding:10px 14px;margin:12px 0;font-size:12px;color:var(--grn);font-weight:600">
    ✅ ${selCount} item dipilih — prompt sudah memperhitungkan penghematan biaya gabungan
  </div>
  <div class="pbox"><div class="ph"><div class="pht">📋 Prompt Estimasi Gabungan</div><button class="cpbtn" onclick="copyText(buildComboPrompt(),this)">📋 Copy</button></div>
  <div class="pb">${esc(prompt)}</div></div>
  <div style="font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Buka AI Gratis 👇</div>
  <div class="aigrid">${links}</div>
  <button class="btn bpu" onclick="openPasteOnly('combo:'+S.combineIds.join(','))">📥 Paste Hasil dari AI</button>`
  :`<div style="text-align:center;padding:16px;color:var(--ink3);font-size:13px">Pilih minimal 2 item di atas</div>`}`;
}

function toggleCombine(id,checked){
  if(checked){if(!S.combineIds.includes(id))S.combineIds.push(id);}
  else{S.combineIds=S.combineIds.filter(x=>x!==id);}
  render();
}

function buildComboPrompt(){
  const city=S.city||'Bandung';
  const sel=S.items.filter(i=>S.combineIds.includes(i.id));
  const list=sel.map((it,i)=>`${i+1}. LOKASI: ${it.room} | JENIS: ${it.category} | TINGKAT: ${it.severity}${it.size?' | UKURAN: '+it.size:''}${it.materialGrade?' | KELAS MATERIAL: '+it.materialGrade:''}
   Deskripsi: ${it.description}${it.notes?'\n   Catatan: '+it.notes:''}`).join('\n\n');
  return`Kamu adalah konsultan renovasi rumah berpengalaman di ${city}.

Berikut adalah ${sel.length} pekerjaan renovasi yang akan DIKERJAKAN SECARA BERSAMAAN oleh tukang yang sama pada waktu yang sama:

${list}

Karena dikerjakan bersamaan, PERHITUNGKAN PENGHEMATAN berikut:
- Biaya mobilisasi tukang cukup sekali (tidak perlu datang berkali-kali)
- Material bisa dibeli sekaligus dalam jumlah besar → harga lebih murah
- Overhead/setup hanya satu kali
- Beberapa pekerjaan bisa berbagi scaffolding, alat, atau bahan dasar yang sama

REFERENSI HARGA WILAYAH ${city.toUpperCase()} 2025-2026:
- Upah tukang harian: Rp 150.000–300.000/hari
- Borongan jasa saja: Rp 600.000–800.000/m²
- Cat tembok: Rp 50.000–200.000/m²
- Pasang keramik: Rp 150.000–500.000/m²

Rekomendasikan merek dan tipe material SPESIFIK sesuai kelas yang diminta per item.

Buat estimasi GABUNGAN dengan format:

## RINGKASAN PEKERJAAN GABUNGAN
[Jelaskan keuntungan mengerjakan sekaligus dan strategi pengerjaan]

---

## KEBUTUHAN MATERIAL GABUNGAN
[Gabungkan material yang sama/sejenis dari semua pekerjaan]

| Material | Merek / Tipe | Jumlah | Satuan | Harga Satuan | Total |
|---|---|---|---|---|---|
| [nama] | [merek spesifik] | [jml] | [sat] | Rp [harga] | Rp [total] |

**Subtotal Material: Rp [jumlah]**

---

## JASA PENGERJAAN GABUNGAN

| Pekerjaan | Volume | Satuan | Harga Satuan | Total |
|---|---|---|---|---|
| [nama] | [jml] | [sat] | Rp [harga] | Rp [total] |

**Subtotal Jasa: Rp [jumlah]**

---

## PERBANDINGAN BIAYA

| Skenario | Estimasi Biaya |
|---|---|
| Dikerjakan terpisah | Rp [jumlah] |
| Dikerjakan bersamaan | Rp [jumlah] |
| **Penghematan** | **Rp [selisih] ([persen]%)** |

**GRAND TOTAL: Rp [total gabungan]**
DURASI PENGERJAAN: [estimasi waktu]

## CATATAN PENTING
[Tips dan hal yang perlu diperhatikan]

Gunakan harga pasar wajar ${city} tahun 2025-2026. Sebutkan merek SPESIFIK.`;
}

  const inclItems=S.items.filter(i=>i.includeInAI!==false);
  const exclCount=S.items.length-inclItems.length;
  const prompt=buildGlobalPrompt();
  const links=AI_APPS.map(a=>`<a href="${a.url}" target="_blank" class="aichip"><span style="font-size:22px">${a.icon}</span><div><div class="acn">${a.name}</div><div class="acs">${a.sub}</div><span class="freetag">${a.free}</span></div></a>`).join('');
  if(!S.items.length)return`<div class="empty"><div class="ei">🏠</div><div class="et">Belum Ada Item</div><div class="es">Tambah kerusakan dulu.</div></div>`;
  if(!inclItems.length)return`<div class="empty"><div class="ei">⊘</div><div class="et">Semua Item Dikecualikan</div><div class="es">Aktifkan minimal 1 item di tab Kerusakan untuk diestimasi AI.</div></div>`;

  let resultBlock='';
  if(S.globalAI){
    const g=S.globalAI;
    const body=g.raw_text?renderMD(g.raw_text):'';
    resultBlock=`<div style="border-radius:var(--r);overflow:hidden;border:1px solid var(--bdr);margin-top:16px">
      <div style="background:var(--ink);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center">

        <button onclick="clearGlobal()" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:5px 10px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">🗑️ Hapus</button>
      </div>
      <div style="padding:16px">${body}</div>
    </div>`;
  }

  return`<div class="how-box"><div class="how-title">📦 Analisis ${inclItems.length} Item Sekaligus</div>
  <div class="how-steps">Satu prompt untuk semua item yang disertakan — dapat prioritas, total budget, dan rekomendasi gabungan.${exclCount>0?` <strong style="color:var(--ink2)">(${exclCount} item kecil dikecualikan)</strong>`:''}</div></div>

  <div class="pb">${esc(prompt)}</div></div>
  <div style="font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Buka AI Gratis 👇</div>
  <div class="aigrid">${links}</div>
  <button class="btn bpu" onclick="openPasteOnly('global')">📥 Paste Hasil dari AI</button>
  ${resultBlock}`;
}

function savePaste(){
  const raw=($('pta')?.value||'').trim();
  if(!raw){toast('⚠️ Paste dulu jawaban dari AI!',true);return;}
  const grand=extractTotal(raw);
  const est={raw_text:raw,grand_total:grand,saved_at:new Date().toISOString()};

  if(S.pasteFor==='global'){
    S.globalAI=est;save('rv3_global',est);
    toast('✅ Analisis global tersimpan!',false,'ok');

  } else if(S.pasteFor?.startsWith('combo:')){
    // Simpan ke tiap item yang dipilih (tandai sbg estimasi gabungan)
    const ids=S.pasteFor.replace('combo:','').split(',');
    ids.forEach(id=>{
      const idx=S.items.findIndex(i=>i.id===id);
      if(idx>=0)S.items[idx].estimasi={...est,combined:true,combined_with:ids.filter(x=>x!==id)};
    });

  } else if(S.pasteFor?.startsWith('item:')){

    const idx=S.items.findIndex(i=>i.id===id);
    if(idx>=0){S.items[idx].estimasi=est;saveItems();}
    toast('✅ Estimasi tersimpan!',false,'ok');
    $('ov').style.display='none';S.detailId=id;go('detail');
  }
}

function extractTotal(raw){
  // Cari GRAND TOTAL atau pola Rp terbesar
  const m=[...raw.matchAll(/(?:GRAND\s+TOTAL|TOTAL\s+KESELURUHAN|TOTAL\s+ESTIMASI)[^\d\n]{0,25}Rp[\s]*([\d.,]+)/gi)];
  if(m.length){const nums=m.map(x=>parseRp(x[1]));return Math.max(...nums);}
  // Fallback: angka Rp terbesar
  const all=[...raw.matchAll(/Rp[\s]*([\d.,]+)/gi)].map(x=>parseRp(x[1]));
  return all.length?Math.max(...all):0;
}
function parseRp(s){if(!s)return 0;return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;}

// Compress foto sebelum disimpan — max 800px, quality 0.72
function compressPhoto(file){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}
        else{w=Math.round(w*MAX/h);h=MAX;}
      }
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',0.72));
    };
    img.onerror=()=>{
      // fallback: pakai FileReader biasa
      const r=new FileReader();
      r.onload=ev=>resolve(ev.target.result);
      r.readAsDataURL(file);
    };
    img.src=url;
  });
}

function addPhoto(e){
  const files=Array.from(e.target.files);
  e.target.value='';
  // Tampilkan loading state
  files.forEach(async f=>{
    try{

      S.form.images.push(compressed);
      render();
    }catch{
      const r=new FileReader();
      r.onload=ev=>{S.form.images.push(ev.target.result);render();};
      r.readAsDataURL(f);
    }
  });
}

async function copyText(text,btn){
  try{await navigator.clipboard.writeText(text);}
  catch{const t=document.createElement('textarea');t.value=text;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();}
  if(btn){const o=btn.textContent;btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent=o,2000);}
  toast('📋 Berhasil di-copy!');
}

function toast(msg,isErr,type){
  // FIX BUG: when isErr=false and type='ok', the ternary short-circuited incorrectly.
  // Now use explicit checks so 'ok' class is applied even when isErr is falsy.
  const cls=isErr?'err':type==='ok'?'ok':'';
  const el=document.createElement('div');
  el.className='toast'+(cls?' '+cls:'');
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function exportJSON(){
  if(!S.items.length){toast('⚠️ Belum ada data untuk diexport',true);return;}
  const payload={
    version:1,
    exportedAt:new Date().toISOString(),
    city:S.city,
    items:S.items,
    globalAI:S.globalAI
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(blob),
    download:`renovasi-backup-${new Date().toISOString().slice(0,10)}.json`
  });
  a.click();URL.revokeObjectURL(a.href);
  toast(`📤 Export berhasil — ${S.items.length} item`);

function importJSON(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const text=await f.text();
      const data=JSON.parse(text);
      if(!data.items||!Array.isArray(data.items))throw new Error('Format tidak valid');
      
      // Merge — skip items with same ID, add new ones
      const existingIds=new Set(S.items.map(i=>i.id));
      const newItems=data.items.filter(i=>!existingIds.has(i.id));
      const merged=S.items.length===0?data.items:[...S.items,...newItems];
      
      S.items=merged;
      if(data.city&&!S.city)S.city=data.city;
      if(data.globalAI&&!S.globalAI)S.globalAI=data.globalAI;
      saveItems();saveCity();
      if(data.globalAI)save('rv3_global',data.globalAI);
      toast(`📥 Import berhasil — ${newItems.length} item baru ditambahkan`);
      render();
    }catch(err){
      toast('❌ File tidak valid atau rusak',true);
    }
  };
  inp.click();
}

// ══════════════════════════════════════
// MERGE DUPLICATES
// ══════════════════════════════════════
function findDuplicates(){
  const groups=[];
  const used=new Set();
  S.items.forEach((a,i)=>{
    if(used.has(a.id))return;
    const grp=[a];
    S.items.forEach((b,j)=>{
      if(i===j||used.has(b.id))return;
      // Same room + category = potential duplicate
      const sameRC=a.room.trim().toLowerCase()===b.room.trim().toLowerCase()&&
                   a.category.trim().toLowerCase()===b.category.trim().toLowerCase();
      // Or very similar description (first 30 chars match)
      const simDesc=a.description.trim().slice(0,30).toLowerCase()===
                    b.description.trim().slice(0,30).toLowerCase()&&a.description.length>5;
      if(sameRC||simDesc){grp.push(b);used.add(b.id);}
    });
    if(grp.length>1){used.add(a.id);groups.push(grp);}
  });
  return groups;
}

function mergeGroup(gi){
  const groups=findDuplicates();
  const grp=groups[gi];if(!grp||grp.length<2)return;
  // Keep item with most data: most images, longest description, has estimasi
  const best=grp.reduce((prev,cur)=>{
    let ps=(prev.images?.length||0)*3+(prev.description?.length||0)+(prev.estimasi?100:0);
    let cs=(cur.images?.length||0)*3+(cur.description?.length||0)+(cur.estimasi?100:0);
    return cs>ps?cur:prev;
  });
  // Merge images from all, deduplicate by first 100 chars
  const allImgs=[...new Map(grp.flatMap(i=>i.images||[]).map(img=>[img.slice(0,100),img])).values()];
  // Merge notes
  const allNotes=[...new Set(grp.map(i=>i.notes).filter(Boolean))].join(' | ');
  const merged={...best,images:allImgs,notes:allNotes||best.notes};
  // Remove all in group, add merged
  const removeIds=new Set(grp.map(i=>i.id));
  S.items=S.items.filter(i=>!removeIds.has(i.id));
  S.items.push(merged);
  saveItems();
  toast(`🔗 ${grp.length} item digabungkan menjadi 1`);
  render();
}

// Menggunakan Blob URL agar bekerja tanpa file sw.js eksternal,
// termasuk saat dijalankan dari Claude artifacts atau file:// lokal.
// ══════════════════════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    const swCode=`
const CACHE='renovasi-v2';
const ASSETS=['./','/'];
self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>
      Promise.allSettled(ASSETS.map(u=>c.add(u).catch(()=>{})))
    ).then(()=>self.skipWaiting())
  );
});
self.addEventListener('activate',e=>{
  e.waitUntil(
    caches.keys().then(keys=>
      Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
    ).then(()=>self.clients.claim())
  );
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  if(e.request.url.startsWith('chrome-extension'))return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      if(cached)return cached;
      return fetch(e.request).then(res=>{
        if(!res||res.status!==200||res.type==='error')return res;
        const clone=res.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
        return res;
      }).catch(()=>{
        if(e.request.destination==='document')
          return caches.match('./')||caches.match('/');
      });
    })
  );
});`;
    try{
      const blob=new Blob([swCode],{type:'application/javascript'});
      const url=URL.createObjectURL(blob);
      navigator.serviceWorker.register(url,{scope:'./'})
        .then(r=>{console.log('SW registered (inline blob)');URL.revokeObjectURL(url);})
        .catch(()=>{
          // Fallback: coba file eksternal sw.js jika tersedia
          navigator.serviceWorker.register('sw.js')
            .then(r=>console.log('SW registered (sw.js)'))
            .catch(e=>console.info('SW tidak tersedia di environment ini:',e.message));
        });
    }catch(e){console.info('SW skip:',e.message);}
  });
}
</script>
</body>
</html>
